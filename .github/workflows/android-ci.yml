name: Android CI

# 在 push / pull_request 时构建 Debug APK
# 在推送 v* 标签时构建并发布 Release APK 到 GitHub Releases
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Set up Android SDK
        # 用专用 Action 接管 Android SDK,避免 Runner 预装环境里畸形版本(如 "34x")导致
        # AGP 加载 SDK 元数据时抛 NumberFormatException
        uses: android-actions/setup-android@v3
        with:
          # cmdline-tools 8.0(8512546)— 最后一个兼容 Java 11 的版本
          # 本项目配 JDK 11(AGP 3.5.3 / Gradle 5.4.1),cmdline-tools 9.0+ 需 Java 17
          cmdline-tools-version: '8512546'
          # 显式接受许可证,避免首次构建卡在交互式 yes/no
          accept-android-sdk-licenses: true

      - name: Install required SDK packages
        # setup-android@v3 不再提供 platforms/build-tools 直接参数,改用 sdkmanager 显式安装
        # 关键:Runner 预装的 cmdline-tools 12.0 需 Java 17(61.0),而本项目只能用 Java 11(55.0)
        # 所以必须强制指到 cmdline-tools/7.0/sdkmanager(class 55.0,Java 11 兼容)
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/cmdline-tools/"
          # 优先用 7.0 路径下的 sdkmanager(Java 11 兼容),避免 latest(12.0,需 Java 17)
          if [ -x "$ANDROID_HOME/cmdline-tools/7.0/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/7.0/bin/sdkmanager"
          else
            SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -1)
          fi
          echo "Using SDKMANAGER=$SDKMANAGER"
          # 安装 platform-29 / build-tools 29.0.3 / platform-tools
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --install "platforms;android-29" "build-tools;29.0.3" "platform-tools"
          echo "--- Installed packages ---"
          "$SDKMANAGER" --list_installed | head -50

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Android signing keystore (optional)
        # 仓库内不直接放 keystore,通过 BASE64 编码的 secret 在 CI 中还原
        # 如果未配置 KEYSTORE_BASE64 secret,base64 解码会失败,脚本会优雅退出(不会让 build 失败)
        # GitHub Actions 限制:secrets.* 不能直接用于 if 条件,所以通过 env 注入后再判断
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set, skipping keystore decoding (will use debug signing)"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/snipaste.keystore
          ls -la app/snipaste.keystore

      - name: Build with Gradle
        # 启用 --info 拿到具体失败 task 与依赖解析日志
        # 失败时只打印最后 300 行,避免刷屏(上次出现 1000+ 行 Resource missing 噪音)
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "===== assembleDebug exit code: $EXIT_CODE ====="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "===== Searching for actual error in build.log ====="
            # 跳过 Resource missing 噪音,定位真正的 FAILED 任务
            grep -E "FAILED|Caused by:|Could not|Execution failed for task|> Task :.*FAILED" build.log | head -50
            echo "===== build.log tail (last 300 lines) ====="
            tail -300 build.log
            exit $EXIT_CODE
          fi

      - name: Collect built APKs
        if: always()
        run: |
          mkdir -p artifacts
          echo "===== Searching for APKs ====="
          find . -name "*.apk" -type f 2>/dev/null || true
          echo "===== Copying APKs to artifacts ====="
          # 用 -exec cp --target-directory 替代多文件 cp {} \;,更安全
          find . -name "*.apk" -type f -exec cp --target-directory=artifacts {} + 2>/dev/null || true
          echo "===== artifacts directory ====="
          ls -la artifacts/ || echo "No artifacts"
          echo "===== build/outputs tree ====="
          ls -la app/build/outputs/ 2>/dev/null || echo "app/build/outputs does not exist"
          # 重命名为简洁名字:snipaste-{debug|release}.apk
          cd artifacts
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              if [[ "$apk" == *"debug"* ]]; then
                mv "$apk" "snipaste-debug.apk" 2>/dev/null
              elif [[ "$apk" == *"release"* ]]; then
                mv "$apk" "snipaste-release.apk" 2>/dev/null
              fi
            fi
          done
          cd ..
          echo "===== Final artifacts ====="
          ls -la artifacts/

      - name: Upload APK artifacts
        if: always()
        # upload-artifact v4 + archive: false 仍然在某些 Runner 上不生效(用户反馈仍是 zip)
        # 改用通用方案:把 APK 重命名到一个固定路径,然后用 gh release-style 走 Releases
        # 但更稳妥的方案是:直接用 Release action 上传(不打包)
        # 这里使用 upload-artifact 的 archive: false,这是官方推荐做法
        uses: actions/upload-artifact@v4
        with:
          name: snipaste-debug
          path: artifacts/snipaste-debug.apk
          archive: false
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snipaste-release
          path: artifacts/snipaste-release.apk
          archive: false
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish to GitHub Packages / direct download
        # 上传到 Releases 时不打包成 zip,直接传 .apk 原文件
        # softprops/action-gh-release 的 files 字段会原样上传,不会自动 zip
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/snipaste-debug.apk
            artifacts/snipaste-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
