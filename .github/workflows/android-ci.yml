name: Android CI

# 在 push / pull_request 时构建 Debug APK
# 在推送 v* 标签时构建并发布 Release APK 到 GitHub Releases
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Android signing keystore (optional)
        # 仓库内不直接放 keystore,通过 BASE64 编码的 secret 在 CI 中还原
        # 如果未配置 KEYSTORE_BASE64 secret,base64 解码会失败,脚本会优雅退出(不会让 build 失败)
        # GitHub Actions 限制:secrets.* 不能直接用于 if 条件,所以通过 env 注入后再判断
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set, skipping keystore decoding (will use debug signing)"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/snipaste.keystore
          ls -la app/snipaste.keystore

      - name: Build with Gradle
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          # 尝试构建 release(无签名时用 debug 签名占位也能成功)
          ./gradlew assembleRelease --no-daemon --stacktrace || echo "Release build skipped or failed, continuing..."

      - name: Collect built APKs
        if: always()
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \; || true
          ls -la artifacts/ || echo "No APK found"

      - name: Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snipaste-android-apk
          path: artifacts/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Publish Release
        # 仅在推送 v* 标签时触发
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
