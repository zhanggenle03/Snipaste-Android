name: Android CI

# 在 push / pull_request 时构建 Debug & Release APK
# 在推送 v* 标签时把 Release APK 发布到 GitHub Releases
on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

# GitHub Releases 发布 + 生成 Release Notes 需要 contents:write 权限；
# 默认 GITHUB_TOKEN 权限不足，会报 "Resource not accessible by integration"
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # AGP 8.2.2 要求 JDK 17+；本地用 Android Studio 自带 JBR 21，
          # 此处统一用 21 保持与本地环境一致（用 17 亦可，AGP 8.2 最低要求 17）。
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        # 用专用 Action 接管 Android SDK，避免 Runner 预装环境里畸形版本(如 "34x")导致
        # AGP 加载 SDK 元数据时抛 NumberFormatException
        # 项目已升级到 AGP 8.2.2 + Gradle 8.6 + compileSdk/targetSdk 34。
        # cmdline-tools 8.0(8512546) 兼容 Java 21，可直接使用。
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '8512546'
          # 显式接受许可证，避免首次构建卡在交互式 yes/no
          accept-android-sdk-licenses: true

      - name: Install required SDK packages
        # 动态定位 sdkmanager（兼容不同 cmdline-tools 子目录名），不再依赖 Java 11 专用的 7.0 路径
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/cmdline-tools/"
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -1)
          echo "Using SDKMANAGER=$SDKMANAGER"
          # compileSdk/targetSdk = 34，必须安装 platform-34 与 build-tools 34.0.0
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "--- Installed packages ---"
          "$SDKMANAGER" --list_installed | head -50

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Android signing keystore (optional)
        # 仓库内不直接放 keystore，通过 BASE64 编码的 secret 在 CI 中还原
        # 如果未配置 KEYSTORE_BASE64 secret，优雅退出(走 debug 签名)
        # 兼容性:支持带/不带 PEM 头尾的 base64，自动剥掉换行/CRLF/空白
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set, skipping keystore decoding (will use debug signing)"
            exit 0
          fi
          # 剥掉 PEM 头尾 + 所有空白/换行/制表符，只留 base64 主体再解码
          echo "$KEYSTORE_BASE64" \
            | grep -v "^-----BEGIN" \
            | grep -v "^-----END" \
            | tr -d '\r\n \t' \
            | base64 -d > app/snipaste.keystore
          ls -la app/snipaste.keystore
          # 立即用 keytool 验证生成的 keystore 可读，密码不对/文件坏掉会在这里挂掉
          STORE_PASS="${KEYSTORE_PASSWORD:-snipaste}"
          if ! keytool -list -keystore app/snipaste.keystore -storepass "$STORE_PASS" >/dev/null 2>&1; then
            echo "ERROR: generated keystore is invalid or password mismatch"
            exit 1
          fi
          echo "Keystore is valid."

      - name: Build with Gradle
        # 启用 --info 拿到具体失败 task 与依赖解析日志
        # 失败时只打印最后 300 行，避免刷屏(上次出现 1000+ 行 Resource missing 噪音)
        # 同步构建 debug + release，这样 Release 产物才是真正签名后的 release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "===== build exit code: $EXIT_CODE ====="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "===== Searching for actual error in build.log ====="
            # 跳过 Resource missing 噪音，定位真正的 FAILED 任务
            grep -E "FAILED|Caused by:|Could not|Execution failed for task|> Task :.*FAILED" build.log | head -50
            echo "===== build.log tail (last 300 lines) ====="
            tail -300 build.log
            exit $EXIT_CODE
          fi

      - name: Collect built APKs
        # 直接取 assembleDebug/assembleRelease 的原始产物，各自放到固定路径
        if: always()
        run: |
          mkdir -p artifacts
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" -type f 2>/dev/null | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" artifacts/snipaste-debug.apk
            echo "Copied debug: $DEBUG_APK"
          else
            echo "No debug APK found"
          fi
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" artifacts/snipaste-release.apk
            echo "Copied release: $RELEASE_APK"
          else
            echo "No release APK found"
          fi
          echo "===== Final artifacts ====="
          ls -la artifacts/

      - name: Upload APK artifacts
        if: always()
        # 注意:官方 actions/upload-artifact 实际输入项不含 archive(该输入在公开版中不存在)，
        # 工件默认会被打包为 .zip 下载。如需原样 .apk，请核对当前 action 版本的文档。
        # 此处保留作者原写法，仅提醒核对 actions/upload-artifact@v7 是否为有效 tag。
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/snipaste-debug.apk
          archive: false
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/snipaste-release.apk
          archive: false
          if-no-files-found: ignore
          retention-days: 30

      - name: Publish to GitHub Releases
        # 上传到 Releases 时不打包成 zip，直接传 .apk 原文件
        # softprops/action-gh-release 的 files 字段会原样上传，不会自动 zip
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/snipaste-debug.apk
            artifacts/snipaste-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
